services:
  skald:
    image: skaldfm/skald:latest
    # build: .  # uncomment to build from source instead
    ports:
      - "7707:7707"
    volumes:
      - skald-data:/app/data
    environment:
      - SKALD_PORT=7707
      - PUID=1000
      - PGID=1000
    restart: unless-stopped

volumes:
  skald-data:
