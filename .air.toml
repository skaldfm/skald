# Air live reload configuration
root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/skald"
  cmd = "go build -o ./tmp/skald ."
  delay = 1000
  exclude_dir = ["data", "tmp", "dist", "node_modules", "static"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "html", "sql"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
