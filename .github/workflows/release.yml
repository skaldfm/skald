name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # The static/ tree (including the built CSS) is embedded into the binary,
      # so the CSS must be compiled before `go build` or releases ship unstyled.
      - name: Build CSS
        run: |
          npm install
          npx @tailwindcss/cli -i static/css/input.css -o static/css/style.css --minify

      - name: Build binaries
        env:
          # Static binaries (no libc dependency) so releases run on any Linux,
          # matching the CGO_ENABLED=0 build the Docker image uses.
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=linux   GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/skald-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/skald-linux-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/skald-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/skald-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/skald-windows-amd64.exe .

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/skald-*
            dist/checksums.txt
