{{define "title"}}Edit {{.Guest.Name}} — Skald{{end}}

{{define "content"}}
<div class="mx-auto max-w-2xl">
    <a href="/guests/{{.Guest.ID}}" class="text-sm text-gray-500 hover:text-gray-700">&larr; Back</a>
    <h1 class="mt-2 text-2xl font-bold text-gray-900">Edit Guest</h1>

    {{if .Error}}
    <div class="mt-4 rounded-md bg-red-50 p-4">
        <p class="text-sm text-red-700">{{.Error}}</p>
    </div>
    {{end}}

    <form method="POST" action="/guests/{{.Guest.ID}}" class="mt-6 space-y-6">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
            <input type="text" name="name" id="name" value="{{.Guest.Name}}"
                   class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                   required autofocus>
        </div>

        <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" name="email" id="email" value="{{.Guest.Email}}"
                   class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
        </div>

        <div>
            <label for="bio" class="block text-sm font-medium text-gray-700">Bio</label>
            <textarea name="bio" id="bio" rows="3"
                      class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">{{.Guest.Bio}}</textarea>
        </div>

        <div>
            <label for="website" class="block text-sm font-medium text-gray-700">Website</label>
            <input type="url" name="website" id="website" value="{{.Guest.Website}}"
                   class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
        </div>

        <div class="flex items-center justify-between">
            <form method="POST" action="/guests/{{.Guest.ID}}/delete"
                  onsubmit="return confirm('Delete this guest?')">
                <button type="submit" class="text-sm text-red-600 hover:text-red-700">Delete guest</button>
            </form>
            <div class="flex items-center space-x-3">
                <a href="/guests/{{.Guest.ID}}" class="rounded-md px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">Cancel</a>
                <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">
                    Save Changes
                </button>
            </div>
        </div>
    </form>
</div>
{{end}}
