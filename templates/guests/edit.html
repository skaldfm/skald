{{define "title"}}Edit {{.Guest.Name}} — Skald{{end}}

{{define "content"}}
<div class="mx-auto max-w-2xl">
    <a href="/guests/{{.Guest.ID}}" class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300">&larr; Back</a>
    <h1 class="mt-2 text-2xl font-bold text-gray-900 dark:text-gray-100">Edit Person</h1>

    {{if .Error}}
    <div class="mt-4 rounded-md bg-red-50 dark:bg-red-900/20 p-4">
        <p class="text-sm text-red-700 dark:text-red-400">{{.Error}}</p>
    </div>
    {{end}}

    <form method="POST" action="/guests/{{.Guest.ID}}" enctype="multipart/form-data" class="mt-6 space-y-6">
        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
            <div class="sm:col-span-2">
                <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Name</label>
                <input type="text" name="name" id="name" value="{{.Guest.Name}}"
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100"
                       required autofocus>
            </div>

            <div class="sm:col-span-2">
                <label class="flex items-center space-x-2">
                    <input type="checkbox" name="is_host" value="1" {{if .Guest.IsHost}}checked{{end}}
                           class="rounded border-gray-300 dark:border-gray-600 text-indigo-600 focus:ring-indigo-500">
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Host</span>
                </label>
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Check if this person is a podcast host (appears in host pickers)</p>
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email</label>
                <input type="email" name="email" id="email" value="{{.Guest.Email}}"
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
            </div>

            <div>
                <label for="website" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Website</label>
                <input type="url" name="website" id="website" value="{{.Guest.Website}}"
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
            </div>

            <div>
                <label for="company" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Company</label>
                <input type="text" name="company" id="company" value="{{.Guest.Company}}"
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
            </div>

            <div>
                <label for="podcast" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Podcast</label>
                <input type="text" name="podcast" id="podcast" value="{{.Guest.Podcast}}"
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
            </div>
        </div>

        <div>
            <span class="block text-sm font-medium text-gray-700 dark:text-gray-300">Photo</span>
            {{if .Guest.Image}}
            <div class="mt-2 flex items-center space-x-4">
                <img src="/uploads/{{.Guest.Image}}" alt="{{.Guest.Name}}" class="h-20 w-20 rounded-full object-cover">
                <label class="flex items-center space-x-2 text-sm text-gray-600 dark:text-gray-400">
                    <input type="checkbox" name="remove_image" value="1" class="rounded border-gray-300 dark:border-gray-600">
                    <span>Remove photo</span>
                </label>
            </div>
            {{end}}
            <div class="mt-2 flex items-center gap-3">
                <label for="image" class="cursor-pointer rounded-md bg-indigo-50 dark:bg-indigo-900/30 px-4 py-2 text-sm font-medium text-indigo-700 dark:text-indigo-400 hover:bg-indigo-100 dark:hover:bg-indigo-900/50">Choose file</label>
                <span class="text-sm text-gray-500 dark:text-gray-400">No file chosen</span>
                <input type="file" name="image" id="image" accept="image/*" class="sr-only" onchange="this.previousElementSibling.textContent = this.files[0]?.name || 'No file chosen'">
            </div>
        </div>

        <div>
            <label for="bio" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Bio</label>
            <textarea name="bio" id="bio" rows="3"
                      class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">{{.Guest.Bio}}</textarea>
        </div>

        <fieldset>
            <legend class="block text-sm font-medium text-gray-700 dark:text-gray-300">Socials</legend>
            <div class="mt-2 grid grid-cols-1 gap-4 sm:grid-cols-2">
                <div>
                    <label for="twitter" class="block text-xs text-gray-500 dark:text-gray-400">Twitter / X</label>
                    <input type="text" name="twitter" id="twitter" value="{{.Guest.Twitter}}" placeholder="@handle"
                           class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
                </div>
                <div>
                    <label for="instagram" class="block text-xs text-gray-500 dark:text-gray-400">Instagram</label>
                    <input type="text" name="instagram" id="instagram" value="{{.Guest.Instagram}}" placeholder="@handle"
                           class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
                </div>
                <div>
                    <label for="linkedin" class="block text-xs text-gray-500 dark:text-gray-400">LinkedIn</label>
                    <input type="text" name="linkedin" id="linkedin" value="{{.Guest.LinkedIn}}" placeholder="URL or username"
                           class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
                </div>
                <div>
                    <label for="mastodon" class="block text-xs text-gray-500 dark:text-gray-400">Mastodon</label>
                    <input type="text" name="mastodon" id="mastodon" value="{{.Guest.Mastodon}}" placeholder="@user@instance"
                           class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
                </div>
            </div>
        </fieldset>

        <div class="flex items-center justify-between">
            <button type="submit" form="delete-form" class="rounded-md px-4 py-2 text-sm font-medium text-red-600 dark:text-red-400 ring-1 ring-red-300 dark:ring-red-700 hover:bg-red-50 dark:hover:bg-red-900/20">Delete person</button>
            <div class="flex items-center space-x-3">
                <a href="/guests/{{.Guest.ID}}" class="rounded-md px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Cancel</a>
                <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">
                    Save Changes
                </button>
            </div>
        </div>
    </form>
    <form id="delete-form" method="POST" action="/guests/{{.Guest.ID}}/delete"
          onsubmit="return confirm('Delete this person?')"></form>
</div>
{{end}}
