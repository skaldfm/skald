{{define "title"}}Guests — Skald{{end}}

{{define "content"}}
<div class="space-y-6">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Guests</h1>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Manage guest contacts</p>
        </div>
        <a href="/guests/new" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">
            New Guest
        </a>
    </div>

    {{if .Guests}}
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
        {{range .Guests}}
        <a href="/guests/{{.ID}}" class="block rounded-lg bg-white dark:bg-gray-800 p-6 shadow hover:shadow-md transition-shadow">
            <h3 class="text-lg font-medium text-gray-900 dark:text-gray-100">{{.Name}}</h3>
            {{if .Email}}
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">{{.Email}}</p>
            {{end}}
            {{if .Bio}}
            <p class="mt-2 text-sm text-gray-400 dark:text-gray-500 line-clamp-2">{{.Bio}}</p>
            {{end}}
        </a>
        {{end}}
    </div>
    {{else}}
    <div class="rounded-lg bg-white dark:bg-gray-800 p-12 text-center shadow">
        <p class="text-gray-500 dark:text-gray-400">No guests yet.</p>
        <a href="/guests/new" class="mt-4 inline-block text-indigo-600 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-400">Add your first guest</a>
    </div>
    {{end}}
</div>
{{end}}
