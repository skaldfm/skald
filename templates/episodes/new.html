{{define "title"}}New Episode — Skald{{end}}

{{define "content"}}
<div class="mx-auto max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">New Episode</h1>

    {{if .Error}}
    <div class="mt-4 rounded-md bg-red-50 dark:bg-red-900/20 p-4">
        <p class="text-sm text-red-700 dark:text-red-400">{{.Error}}</p>
    </div>
    {{end}}

    <form method="POST" action="/episodes" enctype="multipart/form-data" class="mt-6 space-y-6">
        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
            <div class="sm:col-span-2">
                <label for="title" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Title</label>
                <input type="text" name="title" id="title" value="{{if .Title}}{{.Title}}{{end}}"
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100"
                       required autofocus>
            </div>

            <div>
                <label for="show_id" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Show</label>
                <select name="show_id" id="show_id" required
                        class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
                    <option value="">Select a show</option>
                    {{range .Shows}}
                    <option value="{{.ID}}" {{if eq (printf "%d" .ID) $.ShowID}}selected{{end}}>{{.Name}}</option>
                    {{end}}
                </select>
            </div>

            <div>
                <label for="status" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Status</label>
                <select name="status" id="status"
                        class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
                    {{range .Statuses}}
                    <option value="{{.}}" {{if eq . "idea"}}selected{{end}}>{{statusLabel .}}</option>
                    {{end}}
                </select>
            </div>

            <div>
                <label for="episode_number" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Episode Number</label>
                <input type="number" name="episode_number" id="episode_number" min="1"
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
            </div>

            <div>
                <label for="season_number" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Season Number</label>
                <input type="number" name="season_number" id="season_number" min="1"
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
            </div>

            <div>
                <label for="publish_date" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Publish Date</label>
                <input type="text" name="publish_date" id="publish_date" placeholder="YYYY-MM-DD"
                       onfocus="this.type='date'" onblur="if(!this.value)this.type='text'"
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
            </div>
        </div>

        <div>
            <span class="block text-sm font-medium text-gray-700 dark:text-gray-300">Artwork</span>
            <div class="mt-2 flex items-center gap-3">
                <label for="artwork" class="cursor-pointer rounded-md bg-indigo-50 dark:bg-indigo-900/30 px-4 py-2 text-sm font-medium text-indigo-700 dark:text-indigo-400 hover:bg-indigo-100 dark:hover:bg-indigo-900/50">Choose file</label>
                <span class="text-sm text-gray-500 dark:text-gray-400">No file chosen</span>
                <input type="file" name="artwork" id="artwork" accept="image/*" class="sr-only" onchange="this.previousElementSibling.textContent = this.files[0]?.name || 'No file chosen'">
            </div>
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Description</label>
            <textarea name="description" id="description" rows="3"
                      class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">{{if .Description}}{{.Description}}{{end}}</textarea>
        </div>

        <div>
            <label for="script" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Script</label>
            <textarea name="script" id="script" rows="12"
                      class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 font-mono text-sm shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100"></textarea>
        </div>

        <div>
            <label for="tags" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Tags</label>
            <input type="text" name="tags" id="tags"
                   placeholder="Comma-separated tags"
                   class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
            <p class="mt-1 text-xs text-gray-400 dark:text-gray-500">Separate tags with commas</p>
        </div>

        <div>
            <label for="show_notes" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Show Notes</label>
            <textarea name="show_notes" id="show_notes" rows="6"
                      class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100"></textarea>
        </div>

        <div class="flex items-center justify-end space-x-3">
            <a href="/episodes" class="rounded-md px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Cancel</a>
            <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">
                Create Episode
            </button>
        </div>
    </form>
</div>
{{end}}
