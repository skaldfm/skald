{{define "auth"}}
<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50 dark:bg-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Skald{{end}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        if (localStorage.getItem('theme') === 'dark' ||
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="h-full text-gray-900 dark:text-gray-100">
    <div class="min-h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="w-full max-w-md space-y-8">
            <div class="text-center">
                <img src="{{.LogoPath}}" alt="Skald" class="mx-auto h-16 w-16 rounded-full object-cover">
                <h1 class="text-3xl font-bold text-gray-900 dark:text-gray-100">Skald</h1>
                <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">Your stories. Your infrastructure.</p>
            </div>
            {{template "content" .}}
        </div>
    </div>
</body>
</html>
{{end}}
