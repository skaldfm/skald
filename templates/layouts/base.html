{{define "base"}}
<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50 dark:bg-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Skald{{end}}</title>
    <link rel="icon" type="image/png" href="{{.LogoPath}}">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
    <script nonce="{{.Nonce}}">
        if (localStorage.getItem('theme') === 'dark' ||
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="h-full text-gray-900 dark:text-gray-100">
    <div class="min-h-full">
        {{template "nav" .}}
        <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
            {{template "content" .}}
        </main>
    </div>
    <script src="/static/js/tag-picker.js"></script>
    <script nonce="{{.Nonce}}">
    // Confirm guards: forms carrying data-confirm ask before submitting. Registered
    // before the submit-disabler so a cancelled submit (defaultPrevented) leaves the
    // button untouched. Replaces the former inline onsubmit="return confirm(...)".
    document.addEventListener('submit', function(e) {
        var f = e.target;
        if (f.dataset && f.dataset.confirm && !confirm(f.dataset.confirm)) {
            e.preventDefault();
        }
    });
    document.addEventListener('submit', function(e) {
        // A confirm() dialog or validation handler that cancelled the submit
        // sets defaultPrevented; don't stick the button at "Saving\u2026" for a
        // submission that never happened.
        if (e.defaultPrevented) return;
        // e.submitter is the actual button that triggered the submit, so we
        // disable Save rather than whichever submit button appears first (e.g.
        // a Delete button earlier in the form).
        var btn = e.submitter || e.target.querySelector('button[type="submit"]');
        if (btn && !btn.disabled) {
            btn.disabled = true;
            btn.dataset.originalText = btn.textContent;
            btn.textContent = 'Saving\u2026';
        }
    });
    document.addEventListener('htmx:afterRequest', function(e) {
        // Re-enable the specific button we disabled (matched by the marker),
        // not just the first submit button in the form.
        var btn = e.target.querySelector('button[data-original-text]');
        if (btn) {
            btn.disabled = false;
            btn.textContent = btn.dataset.originalText;
            delete btn.dataset.originalText;
        }
    });

    // Auto-submit filter selects (was inline onchange). A <noscript> submit
    // button covers the no-JS case.
    document.addEventListener('change', function(e) {
        if (e.target.matches('select[data-autosubmit]')) {
            e.target.form.submit();
        }
    });

    // File inputs: reflect the chosen filename into the preceding label span.
    document.addEventListener('change', function(e) {
        var t = e.target;
        if (t.matches('input[type="file"][data-file-label]') && t.previousElementSibling) {
            t.previousElementSibling.textContent = t.files[0] ? t.files[0].name : 'No file chosen';
        }
    });

    // Buttons that toggle the "hidden" class on another element (by id).
    document.addEventListener('click', function(e) {
        var trigger = e.target.closest('[data-toggle-target]');
        if (!trigger) return;
        var target = document.getElementById(trigger.dataset.toggleTarget);
        if (target) target.classList.toggle('hidden');
    });

    // Date fields that render as a text placeholder until focused.
    document.addEventListener('focusin', function(e) {
        if (e.target.matches('input[data-datefield]')) e.target.type = 'date';
    });
    document.addEventListener('focusout', function(e) {
        if (e.target.matches('input[data-datefield]') && !e.target.value) e.target.type = 'text';
    });
    </script>
</body>
</html>
{{end}}
