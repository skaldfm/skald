{{define "title"}}New Sponsorship — Skald{{end}}

{{define "content"}}
<div class="mx-auto max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">New Sponsorship</h1>

    {{if .Error}}
    <div class="mt-4 rounded-md bg-red-50 dark:bg-red-900/20 p-4">
        <p class="text-sm text-red-700 dark:text-red-400">{{.Error}}</p>
    </div>
    {{end}}

    <form method="POST" action="/sponsorships" enctype="multipart/form-data" class="mt-6 space-y-6">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Sponsor Name</label>
            <input type="text" name="name" id="name" value="{{if .Name}}{{.Name}}{{end}}"
                   class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100"
                   required autofocus>
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Description</label>
            <textarea name="description" id="description" rows="2"
                      class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">{{if .Description}}{{.Description}}{{end}}</textarea>
        </div>

        <div>
            <label for="script" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Ad Read Script</label>
            <textarea name="script" id="script" rows="6"
                      class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 font-mono text-sm shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">{{if .Script}}{{.Script}}{{end}}</textarea>
        </div>

        <div class="grid grid-cols-1 gap-6 sm:grid-cols-3">
            <div>
                <label for="cpm" class="block text-sm font-medium text-gray-700 dark:text-gray-300">CPM ($)</label>
                <input type="number" name="cpm" id="cpm" step="0.01" min="0"
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
            </div>
            <div>
                <label for="average_listens" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Avg Listens</label>
                <input type="number" name="average_listens" id="average_listens" min="0"
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
            </div>
            <div>
                <label for="total_cost" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Total Cost ($)</label>
                <input type="number" name="total_cost" id="total_cost" step="0.01" min="0"
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
            </div>
        </div>

        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
            <div>
                <label for="drop_date" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Drop Date</label>
                <input type="date" name="drop_date" id="drop_date"
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
            </div>
            <div>
                <label for="payment_due_date" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Payment Due</label>
                <input type="date" name="payment_due_date" id="payment_due_date"
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
            </div>
        </div>

        <div>
            <span class="block text-sm font-medium text-gray-700 dark:text-gray-300">Order Document</span>
            <div class="mt-1 flex items-center gap-3">
                <label for="order_file" class="cursor-pointer rounded-md bg-indigo-50 dark:bg-indigo-900/30 px-4 py-2 text-sm font-medium text-indigo-700 dark:text-indigo-400 hover:bg-indigo-100 dark:hover:bg-indigo-900/50">Choose file</label>
                <span class="text-sm text-gray-500 dark:text-gray-400 file-name-display">No file chosen</span>
                <input type="file" name="order_file" id="order_file" class="sr-only" onchange="this.previousElementSibling.textContent = this.files[0]?.name || 'No file chosen'">
            </div>
        </div>

        <div class="flex items-center justify-end space-x-3">
            <a href="/sponsorships" class="rounded-md px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Cancel</a>
            <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">
                Add Sponsorship
            </button>
        </div>
    </form>
</div>
{{end}}
