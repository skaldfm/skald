{{define "title"}}New Show — Skald{{end}}

{{define "content"}}
<div class="mx-auto max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">New Show</h1>

    {{if .Error}}
    <div class="mt-4 rounded-md bg-red-50 dark:bg-red-900/20 p-4">
        <p class="text-sm text-red-700 dark:text-red-400">{{.Error}}</p>
    </div>
    {{end}}

    <form method="POST" action="/shows" class="mt-6 space-y-6">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Name</label>
            <input type="text" name="name" id="name" value="{{if .Name}}{{.Name}}{{end}}"
                   class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100"
                   required autofocus>
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Description</label>
            <textarea name="description" id="description" rows="4"
                      class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">{{if .Description}}{{.Description}}{{end}}</textarea>
        </div>

        <div>
            <label for="website" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Website</label>
            <input type="url" name="website" id="website" value="{{if .Website}}{{.Website}}{{end}}" placeholder="https://example.com"
                   class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Color</label>
            <div class="mt-2 flex items-center space-x-2">
                {{$current := .Color}}
                {{range showColorPalette}}
                <label class="cursor-pointer">
                    <input type="radio" name="color" value="{{.}}" class="peer sr-only" {{if or (eq . $current) (and (eq $current "") (eq . "slate"))}}checked{{end}}>
                    <span class="block h-8 w-8 rounded-full {{showColorDot .}} ring-2 ring-transparent peer-checked:ring-indigo-500 peer-checked:ring-offset-2 dark:peer-checked:ring-offset-gray-900 hover:opacity-80"></span>
                </label>
                {{end}}
            </div>
        </div>

        <div class="flex items-center justify-end space-x-3">
            <a href="/shows" class="rounded-md px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Cancel</a>
            <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">
                Create Show
            </button>
        </div>
    </form>
</div>
{{end}}
