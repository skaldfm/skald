{{define "title"}}Edit {{.Show.Name}} — Skald{{end}}

{{define "content"}}
<div class="mx-auto max-w-2xl">
    <div class="flex items-center space-x-3">
        <a href="/shows/{{.Show.ID}}" class="text-sm text-gray-500 hover:text-gray-700">&larr; Back</a>
    </div>
    <h1 class="mt-2 text-2xl font-bold text-gray-900">Edit Show</h1>

    {{if .Error}}
    <div class="mt-4 rounded-md bg-red-50 p-4">
        <p class="text-sm text-red-700">{{.Error}}</p>
    </div>
    {{end}}

    <form method="POST" action="/shows/{{.Show.ID}}" enctype="multipart/form-data" class="mt-6 space-y-6">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
            <input type="text" name="name" id="name" value="{{.Show.Name}}"
                   class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                   required autofocus>
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
            <textarea name="description" id="description" rows="4"
                      class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">{{.Show.Description}}</textarea>
        </div>

        <div>
            <label for="artwork" class="block text-sm font-medium text-gray-700">Artwork</label>
            {{if .Show.Artwork}}
            <div class="mt-2 flex items-center space-x-4">
                <img src="/uploads/{{.Show.Artwork}}" alt="Show artwork" class="h-20 w-20 rounded-lg object-cover">
                <label class="flex items-center space-x-2 text-sm text-gray-600">
                    <input type="checkbox" name="remove_artwork" value="1" class="rounded border-gray-300">
                    <span>Remove artwork</span>
                </label>
            </div>
            {{end}}
            <input type="file" name="artwork" id="artwork" accept="image/*"
                   class="mt-2 block w-full text-sm text-gray-500 file:mr-4 file:rounded-md file:border-0 file:bg-indigo-50 file:px-4 file:py-2 file:text-sm file:font-medium file:text-indigo-700 hover:file:bg-indigo-100">
        </div>

        <div class="flex items-center justify-between">
            <form method="POST" action="/shows/{{.Show.ID}}/delete"
                  onsubmit="return confirm('Delete this show? All episodes will also be deleted.')">
                <button type="submit" class="text-sm text-red-600 hover:text-red-700">Delete show</button>
            </form>
            <div class="flex items-center space-x-3">
                <a href="/shows/{{.Show.ID}}" class="rounded-md px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">Cancel</a>
                <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">
                    Save Changes
                </button>
            </div>
        </div>
    </form>
</div>
{{end}}
