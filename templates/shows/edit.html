{{define "title"}}Edit {{.Show.Name}} — Skald{{end}}

{{define "content"}}
<div class="mx-auto max-w-2xl">
    <div class="flex items-center space-x-3">
        <a href="/shows/{{.Show.ID}}" class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300">&larr; Back</a>
    </div>
    <h1 class="mt-2 text-2xl font-bold text-gray-900 dark:text-gray-100">Edit Show</h1>

    {{if .Error}}
    <div class="mt-4 rounded-md bg-red-50 dark:bg-red-900/20 p-4">
        <p class="text-sm text-red-700 dark:text-red-400">{{.Error}}</p>
    </div>
    {{end}}

    <form method="POST" action="/shows/{{.Show.ID}}" enctype="multipart/form-data" class="mt-6 space-y-6">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Name</label>
            <input type="text" name="name" id="name" value="{{.Show.Name}}"
                   class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100"
                   required autofocus>
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Description</label>
            <textarea name="description" id="description" rows="4"
                      class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:bg-gray-700 dark:text-gray-100">{{.Show.Description}}</textarea>
        </div>

        <div>
            <label for="artwork" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Artwork</label>
            {{if .Show.Artwork}}
            <div class="mt-2 flex items-center space-x-4">
                <img src="/uploads/{{.Show.Artwork}}" alt="Show artwork" class="h-20 w-20 rounded-lg object-cover">
                <label class="flex items-center space-x-2 text-sm text-gray-600 dark:text-gray-400">
                    <input type="checkbox" name="remove_artwork" value="1" class="rounded border-gray-300 dark:border-gray-600">
                    <span>Remove artwork</span>
                </label>
            </div>
            {{end}}
            <div class="mt-2 flex items-center gap-3">
                <label for="artwork" class="cursor-pointer rounded-md bg-indigo-50 dark:bg-indigo-900/30 px-4 py-2 text-sm font-medium text-indigo-700 dark:text-indigo-400 hover:bg-indigo-100 dark:hover:bg-indigo-900/50">Choose file</label>
                <span class="text-sm text-gray-500 dark:text-gray-400">No file chosen</span>
                <input type="file" name="artwork" id="artwork" accept="image/*" class="sr-only" onchange="this.previousElementSibling.textContent = this.files[0]?.name || 'No file chosen'">
            </div>
        </div>

        <div class="flex items-center justify-between">
            <button type="submit" form="delete-form" class="rounded-md px-4 py-2 text-sm font-medium text-red-600 dark:text-red-400 ring-1 ring-red-300 dark:ring-red-700 hover:bg-red-50 dark:hover:bg-red-900/20">Delete show</button>
            <div class="flex items-center space-x-3">
                <a href="/shows/{{.Show.ID}}" class="rounded-md px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Cancel</a>
                <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">
                    Save Changes
                </button>
            </div>
        </div>
    </form>
    <form id="delete-form" method="POST" action="/shows/{{.Show.ID}}/delete"
          onsubmit="return confirm('Delete this show? All episodes will also be deleted.')"></form>
</div>
{{end}}
