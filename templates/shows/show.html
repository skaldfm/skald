{{define "title"}}{{.Show.Name}} — Skald{{end}}

{{define "content"}}
<div class="space-y-6">
    <div class="flex items-center justify-between">
        <div>
            <div class="flex items-center space-x-3">
                <a href="/shows" class="text-sm text-gray-500 hover:text-gray-700">&larr; Shows</a>
            </div>
            <h1 class="mt-2 text-2xl font-bold text-gray-900">{{.Show.Name}}</h1>
        </div>
        <div class="flex items-center space-x-3">
            <a href="/shows/{{.Show.ID}}/edit" class="rounded-md bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm ring-1 ring-gray-300 hover:bg-gray-50">
                Edit
            </a>
            <a href="/episodes?show={{.Show.ID}}" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">
                Episodes
            </a>
        </div>
    </div>

    <div class="rounded-lg bg-white p-6 shadow">
        {{if .Show.Description}}
        <p class="text-gray-700 whitespace-pre-wrap">{{.Show.Description}}</p>
        {{else}}
        <p class="text-gray-400 italic">No description</p>
        {{end}}
    </div>
</div>
{{end}}
