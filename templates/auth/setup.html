{{define "title"}}Setup — Skald{{end}}
{{define "content"}}
<div class="bg-white dark:bg-gray-800 rounded-lg shadow px-6 py-8">
    <h2 class="text-xl font-semibold mb-2 text-center">Welcome to Skald</h2>
    <p class="text-sm text-gray-500 dark:text-gray-400 text-center mb-6">Create your account to get started.</p>

    {{if .Error}}
    <div class="mb-4 rounded-md bg-red-50 dark:bg-red-900/30 p-4">
        <p class="text-sm text-red-700 dark:text-red-300">{{.Error}}</p>
    </div>
    {{end}}

    <form method="POST" action="/auth/setup" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email</label>
            <input type="email" name="email" id="email" value="{{.Email}}" required autofocus
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
        </div>

        <div>
            <label for="display_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Your name</label>
            <input type="text" name="display_name" id="display_name" value="{{.DisplayName}}"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
            <input type="password" name="password" id="password" required minlength="8"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
        </div>

        <div>
            <label for="confirm_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Confirm Password</label>
            <input type="password" name="confirm_password" id="confirm_password" required minlength="8"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
        </div>

        <button type="submit"
                class="w-full flex justify-center rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            Create Account
        </button>
    </form>
</div>
{{end}}
